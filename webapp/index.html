<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facebook Message Helper</title>
  <style>
    :root{--bg:#f6f1e7;--card:#fffdf7;--ink:#1f2937;--muted:#6b7280;--line:#e6dccb;--accent:#2563eb;--soft:#eef2ff;--good:#166534}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}header{padding:18px 16px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}h1{font-size:20px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:4px}.wrap{max-width:1100px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.04)}label{display:block;font-size:13px;font-weight:700;margin:10px 0 6px}textarea,input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit;background:#fff}textarea{min-height:210px;resize:vertical}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button{border:0;border-radius:999px;padding:10px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer}button.secondary{background:#e5e7eb;color:#111827}button.good{background:var(--good)}.pill{font-size:12px;background:var(--soft);border-radius:999px;padding:6px 10px;color:#3730a3}.out{white-space:pre-wrap;line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;min-height:80px}.reply{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px;margin:8px 0}.reply button{margin-top:8px}.small{font-size:12px;color:var(--muted)}@media(max-width:800px){.wrap{grid-template-columns:1fr}textarea{min-height:170px}}</style>
</head>
<body>
<header><h1>Facebook Message Helper</h1><div class="sub">Read visible Facebook/Messenger text, translate it, then suggest replies.</div></header>
<main class="wrap">
  <section class="card">
    <div class="row"><span class="pill">Manual paste</span><span class="pill">Extension capture ready</span><span class="pill">Mobile notification-ready</span></div>
    <label>Facebook / Messenger messages</label>
    <textarea id="messages" placeholder="Paste messages here, or use the browser extension to capture visible messages."></textarea>
    <label>Reply tone</label>
    <select id="tone">
      <option>Short, natural and humble</option>
      <option>Friendly and warm</option>
      <option>Professional</option>
      <option>Casual with light humour</option>
      <option>Polite teacher style</option>
    </select>
    <label>Target reply language</label>
    <select id="language">
      <option>Same language as the other person</option>
      <option>English</option>
      <option>Chinese</option>
      <option>Malay</option>
      <option>Tamil</option>
      <option>Japanese</option>
      <option>Korean</option>
      <option>Thai</option>
      <option>Vietnamese</option>
    </select>
    <div class="row" style="margin-top:12px">
      <button onclick="analyse()">Translate + Suggest Replies</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
    <p class="small">API endpoint can be changed in code: <code>API_BASE</code>. Keep API keys on the server, not in the browser.</p>
  </section>
  <section class="card">
    <label>Detected / translated meaning</label>
    <div id="translation" class="out">No analysis yet.</div>
    <label>Suggested replies</label>
    <div id="replies"></div>
  </section>
</main>
<script>
const API_BASE = localStorage.getItem('fbHelperApiBase') || 'http://localhost:8787';
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'FB_HELPER_CAPTURE') {
    document.getElementById('messages').value = event.data.text || '';
  }
});
async function analyse(){
  const messages = document.getElementById('messages').value.trim();
  if(!messages){alert('Paste or capture some messages first.');return;}
  const tone = document.getElementById('tone').value;
  const language = document.getElementById('language').value;
  document.getElementById('translation').textContent = 'Analysing...';
  document.getElementById('replies').innerHTML = '';
  try{
    const res = await fetch(`${API_BASE}/api/suggest`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,tone,language})});
    if(!res.ok) throw new Error(await res.text());
    const data = await res.json();
    document.getElementById('translation').textContent = data.translation || '';
    renderReplies(data.replies || []);
  }catch(e){
    document.getElementById('translation').textContent = 'Server not connected. Using offline template suggestions.';
    renderReplies(makeOfflineReplies(messages, tone, language));
  }
}
function renderReplies(items){
  const box=document.getElementById('replies');
  box.innerHTML='';
  items.forEach((text,i)=>{
    const div=document.createElement('div'); div.className='reply';
    div.innerHTML=`<b>Reply ${i+1}</b><div style="margin-top:6px;white-space:pre-wrap"></div>`;
    div.querySelector('div').textContent=text;
    const btn=document.createElement('button'); btn.className='good'; btn.textContent='Copy reply';
    btn.onclick=()=>navigator.clipboard.writeText(text);
    div.appendChild(btn); box.appendChild(div);
  });
}
function makeOfflineReplies(){return [
  'Haha no lah, I just like seeing nice places and good food. But of course talking to you is more interesting 😊',
  'You jealous ah? Don’t worry, I’m not looking at other beauties 😄',
  'I think the best view is still good company, not TikTok beauties 😂'
];}
function clearAll(){document.getElementById('messages').value='';document.getElementById('translation').textContent='No analysis yet.';document.getElementById('replies').innerHTML='';}
</script>
</body></html>
