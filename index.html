<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Facebook Message Helper</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:#eaf0f7;color:#0b1730}.app{height:100vh;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px}.panel{height:calc(100vh - 32px);overflow:auto;background:white;border-radius:22px;padding:18px;box-shadow:0 2px 18px #cbd5e1}.side{background:#111c2e;color:white}.card{background:#1c293b;border:1px solid #334155;border-radius:16px;padding:14px;margin:12px 0}.btn{width:100%;border:0;border-radius:14px;padding:14px 16px;font-weight:800;font-size:16px;cursor:pointer}.blue{background:#2f66e8;color:white}.grey{background:#e5e7eb;color:#0b1730}.red{background:#991b1b;color:white}.chat{display:grid;gap:14px}.msg{min-height:78px;border:1px solid #dbe3ee;border-radius:18px;padding:18px;display:grid;grid-template-columns:70px 1fr;align-items:start;background:#f8fafc}.me{background:#eaf3ff}.role{font-weight:900;color:#64748b;font-size:13px}.text{font-size:20px;line-height:1.35}textarea,select{width:100%;border:1px solid #46566d;border-radius:14px;background:#0f172a;color:white;padding:12px;font-size:15px}textarea{min-height:110px}.thread{display:grid;grid-template-columns:1fr 48px;gap:8px}.thread button{border:0;border-radius:12px;background:#5b1d1d;color:white;font-size:18px}.active{background:#2f66e8}.suggest{background:#334155;padding:12px;border-radius:14px;margin:8px 0;cursor:pointer}.suggest.active{background:#2856d8}.status{font-size:13px;color:#cbd5e1}.heads{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #dbe3ee;margin-bottom:18px;padding-bottom:12px}h1{margin:0;font-size:28px}@media(max-width:1000px){.app{grid-template-columns:1fr;height:auto}.panel{height:auto;min-height:70vh}.side{order:1}.orig{order:2}.trans{order:3}}
</style></head><body><div class="app"><aside class="panel side"><h2>Facebook Message Helper</h2><div class="card status" id="status">Ready. Auto-save is on.</div><div class="card"><b>Target translation language</b><br><br><select id="lang"><option>English</option><option>Chinese</option><option>Malay</option><option>Japanese</option></select></div><button class="btn red" id="clearAll">🗑 Remove all old chats</button><div id="threads"></div><div class="card"><h3>Reply Helper</h3><div id="selected">Select a message.</div><br><b>Reply tone</b><br><br><select id="tone"><option>Simple</option><option>Humble</option><option>Playful</option><option>Flirty</option><option>Polite</option></select><br><br><button class="btn blue" id="suggestBtn">✨ Suggest replies</button><div id="suggestions"></div><textarea id="reply" placeholder="Selected reply"></textarea><br><br><button class="btn grey" id="copy">Copy</button></div><div class="card"><h3>Paste / Import Chat</h3><textarea id="paste" placeholder="Paste messages line by line..."></textarea><br><br><button class="btn grey" id="add">↻ Add chat and auto-save</button></div></aside><main class="panel orig"><div class="heads"><h1>Original Language</h1><b id="title">Pasted Facebook Chat</b></div><div class="chat" id="orig"></div></main><main class="panel trans"><div class="heads"><h1>Translation</h1><b id="langTitle">English</b></div><div class="chat" id="trans"></div></main></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyDNphiv78xMwfXge0B3t1L7nPR1xpNSniQ',authDomain:'facebook-message-helper.firebaseapp.com',projectId:'facebook-message-helper',storageBucket:'facebook-message-helper.firebasestorage.app',messagingSenderId:'1086563460953',appId:'1:1086563460953:web:6ed44bc6d16afb7dfa0e48'};
const app=initializeApp(firebaseConfig), db=getFirestore(app);let threads=[],current=null,selectedIndex=0,saveTimer=null;
const $=id=>document.getElementById(id); const strip=s=>s.trim();
function isNoise(s){return !s||/^\d{1,2}\s[A-Za-z]{3}\s\d{4},?\s*\d{1,2}:\d{2}/.test(s)||/^(today|yesterday|seen|sent|delivered)$/i.test(s)||/^\d{1,2}:\d{2}\s?(am|pm)?$/i.test(s)}
function parse(raw){const out=[];let last='';raw.split(/\n+/).map(strip).filter(x=>!isNoise(x)).forEach((t,i)=>{if(t===last)return;last=t;out.push({role:i%2?'me':'them',text:t,translation:localTranslate(t)})});return out}
function hasHan(s){return /[\u3400-\u9fff]/.test(s)}
const dict=new Map([['为什么今天有空','Why are you free today?'],['空每天都有','There is always free time every day.'],['今天看起来有点不一样','You seem a little different today.'],['那里不一样？','What is different?'],['好像很冷','It seems quite cold.'],['对美女没有兴趣吗？','Are you not interested in beautiful women?'],['明天聊咯 很晚了 要睡觉觉啦 晚安','Let’s chat tomorrow. It’s late, I need to sleep. Good night.'],['新加坡也不是一样','Singapore is also the same.'],['你认识很多？','Do you know many women?'],['不过美食和风景比较容易实现','But food and scenery are easier to experience in real life.']]);
function localTranslate(t){if(!hasHan(t))return t; if(dict.has(t))return dict.get(t); return t}
async function aiTranslate(){if(!current)return; $('status').textContent='Translating...';try{const r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target:$('lang').value,messages:current.messages})});const d=await r.json();if(Array.isArray(d.translations)&&d.translations.length){current.messages=current.messages.map((m,i)=>({...m,translation:d.translations[i]||localTranslate(m.text)}));}else{current.messages=current.messages.map(m=>({...m,translation:localTranslate(m.text)}));}}catch(e){current.messages=current.messages.map(m=>({...m,translation:localTranslate(m.text)}));}$('status').textContent='Auto-saved. Translation shown.';render();autoSave()}
function render(){if(!current)return;$('langTitle').textContent=$('lang').value;$('orig').innerHTML='';$('trans').innerHTML='';current.messages.forEach((m,i)=>{['orig','trans'].forEach((id)=>{const el=document.createElement('div');el.className='msg '+(m.role==='me'?'me':'');el.onclick=()=>{selectedIndex=i;render()};el.innerHTML=`<div class=role>${m.role==='me'?'ME':'THEM'}</div><div class=text>${id==='orig'?m.text:m.translation}</div>`;if(i===selectedIndex)el.style.outline='3px solid #60a5fa';$(id).appendChild(el)});});const m=current.messages[selectedIndex];$('selected').innerHTML=m?`<b>Selected message</b><p>${m.text}</p><b>${m.translation}</b>`:'Select a message.';renderThreads()}
function renderThreads(){ $('threads').innerHTML='';threads.forEach(t=>{const wrap=document.createElement('div');wrap.className='thread';const b=document.createElement('button');b.className='card '+(current&&current.id===t.id?'active':'');b.innerHTML=`<b>${t.title||'Pasted Facebook Chat'}</b><br><small>${(t.messages?.[0]?.text||'').slice(0,45)}</small>`;b.onclick=()=>{current=t;selectedIndex=Math.max(0,(t.messages||[]).length-1);render();};const del=document.createElement('button');del.textContent='🗑';del.onclick=async()=>{if(t.id)await deleteDoc(doc(db,'threads',t.id))};wrap.append(b,del);$('threads').appendChild(wrap)})}
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{if(!current)return;if(current.id){await updateDoc(doc(db,'threads',current.id),{...current,updatedAt:serverTimestamp()})}else{const ref=await addDoc(collection(db,'threads'),{...current,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});current.id=ref.id}$('status').textContent='Saved to Firebase';},800)}
$('add').onclick=async()=>{const msgs=parse($('paste').value);if(!msgs.length)return;const key=msgs.map(m=>m.text).join('|');const found=threads.find(t=>(t.messages||[]).map(m=>m.text).join('|')===key);if(found){current=found;selectedIndex=found.messages.length-1;render();return}current={title:'Pasted Facebook Chat',messages:msgs};selectedIndex=msgs.length-1;render();await aiTranslate();$('paste').value=''};
$('suggestBtn').onclick=()=>{const m=current?.messages?.[selectedIndex];if(!m)return;const isCn=hasHan(m.text);const base=m.text;let arr;if(isCn&&/晚安|睡觉|很晚|明天聊/.test(base)){arr=['好呀，晚安，早点休息 😊','好的，明天再聊。晚安 😄','嗯嗯，快去睡吧，祝你睡个好觉。'];}else if(isCn){arr=['哈哈，明白。你这样说也挺有意思的 😄','不会啦，我觉得这样聊天蛮自然的。','哈哈，你是在故意逗我吗？'];}else{arr=['Thanks, I understand. I’ll reply properly shortly.','Sounds good. Let me check and get back to you.','Haha okay, I see what you mean.'];}$('suggestions').innerHTML='';arr.forEach((s,i)=>{const d=document.createElement('div');d.className='suggest '+(i==0?'active':'');d.textContent=`(${$('tone').value}) ${s}`;d.onclick=()=>{$('reply').value=s};$('suggestions').appendChild(d);if(i==0)$('reply').value=s})};
$('copy').onclick=()=>navigator.clipboard.writeText($('reply').value||'');$('lang').onchange=aiTranslate;$('clearAll').onclick=async()=>{for(const t of threads)if(t.id)await deleteDoc(doc(db,'threads',t.id))};
onSnapshot(collection(db,'threads'),snap=>{threads=snap.docs.map(d=>({id:d.id,...d.data()}));if(!current&&threads[0])current=threads[0];renderThreads();if(current){const fresh=threads.find(t=>t.id===current.id);if(fresh){current=fresh;render();}}});
</script></body></html>
